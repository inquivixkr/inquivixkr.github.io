<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 회원가입 · LiveBolt</title>
  <style>
    :root {
      --navy: #0f3247;
      --orange: #f5a623;
      --border: #e2eaf0;
      --bg: #f4f7fa;
      --card: #ffffff;
      --text: #1a2533;
      --muted: #6b7e8e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      color: #fff;
      padding: 48px 12vw;
      text-align: center;
    }

    header h1 {
      font-size: clamp(32px, 4vw, 44px);
      font-weight: 900;
      margin-bottom: 12px;
    }

    header p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
    }

    main {
      max-width: 960px;
      margin: -40px auto 60px;
      padding: 0 24px;
      display: grid;
      gap: 32px;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 16px 35px rgba(15, 50, 71, 0.08);
    }

    .card h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
      margin-bottom: 22px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    label {
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input,
    select {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
    }

    .btn-primary {
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--orange), #ffbe55);
      color: var(--navy);
      font-weight: 700;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .social-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .social-btn {
      flex: 1;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      color: #fff;
    }

    .social-btn.naver {
      background: #03c75a;
    }

    .social-btn.kakao {
      background: #facc15;
      color: #191919;
    }

    .info-line {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-line span {
      text-decoration: underline;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 40px 0 20px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header,
      main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .social-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="tag">LiveBolt 개인 회원가입</div>
    <h1>한 번의 등록으로 맞춤 채용과 커뮤니티까지</h1>
    <p>이력서, 경력, 기업 후기 데이터를 하나로 묶어 커리어를 한눈에 바라보세요.</p>
  </header>

  <main>
    <div class="card">
      <h2>프로필 정보</h2>
      <p>필수 항목을 입력하시면 개인 대시보드로 이동하여 추천 공고와 커뮤니티를 즉시 이용할 수 있습니다.</p>
      <form>
        <div>
          <label for="name">이름</label>
          <input id="name" type="text" placeholder="홍길동" />
        </div>
        <div>
          <label for="phone">휴대폰</label>
          <input id="phone" type="tel" placeholder="010-1234-5678" />
        </div>
        <div>
          <label for="email">이메일</label>
          <input id="email" type="email" placeholder="bolt@example.com" />
        </div>
        <div>
          <label for="career">주요 직무</label>
          <select id="career">
            <option>직무 선택</option>
            <option>공정 엔지니어</option>
            <option>장비 엔지니어</option>
            <option>설계/Si</option>
          </select>
        </div>
        <div>
          <label for="experience">경력 연차</label>
          <input id="experience" type="text" placeholder="예: 4년 6개월" />
        </div>
        <button class="btn-primary" type="button">회원가입 계속</button>
      </form>
      <div class="social-row">
        <button class="social-btn naver">네이버로 빠른 등록</button>
        <button class="social-btn kakao">카카오톡으로 빠른 등록</button>
      </div>
      <div class="info-line">
        <span>이용약관 · 개인정보처리방침 보기</span>
        <span>FAQ</span>
      </div>
    </div>
  </main>

  <footer>© 2026 LiveBolt · 운영: 인퀴빅스 테크놀로지스</footer>
</body>
</html>
